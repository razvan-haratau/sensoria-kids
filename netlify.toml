[build]
  command   = "npm run build"
  publish   = "dist"

# SPA routing — toate rutele merg la index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Headers de securitate (backup față de public/_headers)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "DENY"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "camera=(), microphone=(), geolocation=()"
